name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            asset_name: fox-gateway_linux_amd64
          - runner: macos-15-intel
            goos: darwin
            goarch: amd64
            asset_name: fox-gateway_darwin_amd64
          - runner: macos-14
            goos: darwin
            goarch: arm64
            asset_name: fox-gateway_darwin_arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Validate installer script
        run: sh -n scripts/install.sh

      - name: Run Go tests
        run: go test ./...

      - name: Build target with GoReleaser
        uses: goreleaser/goreleaser-action@v6
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        with:
          distribution: goreleaser
          version: '~> v2'
          args: build --clean --single-target --id fox-gateway --output dist/${{ matrix.asset_name }} --config .goreleaser.yml

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
